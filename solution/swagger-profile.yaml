openapi: 3.0.0
info:
  title: HHCC Profile Service API
  version: 1.0.0
  description: API for managing user identity and profiles globally.
servers:
  - url: http://ms-profile-service:8080/api/v1
paths:
  /profiles/health:
    get:
      summary: Health check endpoint returning Service and DB status
      responses:
        '200':
          description: Service and DB status
          content:
            application/json:
              example:
                service: UP
                database: CONNECTED
  /profiles:
    get:
      summary: Retrieve all profiles
      responses:
        '200':
          description: A list of profiles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserProfile'
    post:
      summary: Create a new user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfile'
      responses:
        '201':
          description: Created
          
components:
  schemas:
    UserProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
        contactNumber:
          type: string
        createdBy:
          type: integer
          format: int64
        updatedBy:
          type: integer
          format: int64

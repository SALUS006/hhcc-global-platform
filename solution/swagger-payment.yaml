openapi: 3.0.0
info:
  title: HHCC Payment Service API
  version: 1.0.0
  description: >
    MVP-scoped API for capturing and tracking mock payment invoices
    triggered by confirmed care bookings.
    Real payment gateway integration (Stripe/PayPal) is deferred to post-MVP.
    Note: Only /health is currently live. Invoice routes are planned for Days 2-3.
servers:
  - url: http://localhost:8082/api/v1
    description: Local Docker deployment
  - url: http://ms-payment-service:8082/api/v1
    description: Internal Docker network

# ─────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────
paths:
  /payment/invoices/{id}/pay:
    put:
      tags: [Invoices]
      summary: Pay an invoice using a card
      description: >
        Processes payment for an invoice. For CREDIT_CARD, card details are required in the request body. Only card_last4, card_expiry, and cardholder_name are stored; CVV is never stored for PCI compliance.
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the invoice to pay
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardPaymentRequest'
            example:
              paymentMethod: CREDIT_CARD
              cardNumber: '4242424242424242'
              cardExpiry: '12/2030'
              cardCvv: '123'
              cardholderName: 'Jane Doe'
      responses:
        '200':
          description: Invoice paid successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentInvoice'
        '400':
          description: Invalid request payload or payment failed
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Health ──────────────────────────────────────────────────
  /payment/health:
    get:
      tags: [Health]
      summary: Health check — returns service and database status
      responses:
        '200':
          description: Service is UP and DB is CONNECTED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                service: UP
                database: CONNECTED
        '503':
          description: DB DISCONNECTED
          content:
            application/json:
              example:
                service: UP
                database: DISCONNECTED
                error: "Communications link failure"

  # ── Invoices ─────────────────────────────────────────────────
  /payment/invoices:
    post:
      tags: [Invoices]
      summary: Submit a mock payment for a booking (UC#9)
      description: >
        Captures a payment request for a given booking. In the MVP, all
        payments are mocked (paymentMethod = MOCK) and immediately resolved.
        Real Stripe/PayPal integration is a post-MVP enhancement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInvoiceRequest'
            example:
              bookingId: 1
              amount: 120.00
              currency: USD
              paymentMethod: MOCK
      responses:
        '201':
          description: Payment invoice created and mock payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentInvoice'
              example:
                id: 1
                bookingId: 1
                amount: 120.00
                currency: USD
                paymentMethod: MOCK
                status: PAID
        '400':
          description: Invalid request payload
        '404':
          description: Booking not found

  /payment/invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get a payment invoice by invoice ID
      description: >
        Retrieves a payment invoice using its unique invoice ID.
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the invoice to retrieve
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Invoice found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentInvoice'
        '404':
          $ref: '#/components/responses/NotFound'

  /payment/invoices/{id}/refund:
    post:
      tags: [Invoices]
      summary: Refund a payment invoice (post-MVP, stub endpoint)
      description: >
        Marks a paid invoice as REFUNDED. MVP implementation is mocked only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Invoice refunded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentInvoice'
        '404':
          $ref: '#/components/responses/NotFound'

# ─────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────
components:

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          example:
            status: 404
            error: "Not Found"

  schemas:

    CardPaymentRequest:
      type: object
      required: [paymentMethod, cardNumber, cardExpiry, cardCvv, cardholderName]
      properties:
        paymentMethod:
          type: string
          enum: [CREDIT_CARD]
          description: Must be CREDIT_CARD for card payments
        cardNumber:
          type: string
          minLength: 12
          maxLength: 19
          description: Full card number (only last4 stored)
        cardExpiry:
          type: string
          pattern: '^(0[1-9]|1[0-2])/20[0-9]{2}$'
          example: '12/2030'
          description: Card expiry in MM/YYYY
        cardCvv:
          type: string
          minLength: 3
          maxLength: 4
          description: Card CVV (never stored)
        cardholderName:
          type: string
          maxLength: 100
          description: Name on card

    HealthResponse:
      type: object
      properties:
        service:
          type: string
          example: UP
        database:
          type: string
          example: CONNECTED

    PaymentInvoiceRequest:
      type: object
      required: [bookingId, amount]
      properties:
        bookingId:
          type: integer
          format: int64
          description: References care_booking.id
        amount:
          type: number
          format: double
          example: 120.00
        currency:
          type: string
          default: USD
          example: USD
        paymentMethod:
          type: string
          enum: [MOCK, CREDIT_CARD, PAYPAL]
          default: MOCK

    PaymentInvoice:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bookingId:
          type: integer
          format: int64
        amount:
          type: number
          format: double
        currency:
          type: string
          example: USD
        paymentDate:
          type: string
          format: date-time
          nullable: true
        paymentMethod:
          type: string
          enum: [MOCK, CREDIT_CARD, PAYPAL]
        cardLast4:
          type: string
          maxLength: 4
          description: Last 4 digits of card number (if paid by card)
        cardExpiry:
          type: string
          example: '12/2030'
          description: Card expiry in MM/YYYY (if paid by card)
        cardholderName:
          type: string
          maxLength: 100
          description: Name on card (if paid by card)
        status:
          type: string
          enum: [UNPAID, PAID, REFUNDED]
        createdBy:
          type: integer
          format: int64
        updatedBy:
          type: integer
          format: int64

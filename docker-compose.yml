version: '3.8'

services:
  # Base PostgreSQL Database - Owned by Sandeep & Naveen
  hhcc-postgres:
    image: postgres:16-alpine
    container_name: hhcc-db
    environment:
      POSTGRES_USER: hhcc_user
      POSTGRES_PASSWORD: hhcc_password
      POSTGRES_DB: hhcc_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - hhcc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hhcc_user -d hhcc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Note: The Angular, Node.js Orchestrator, and 3x Spring Boot containers 
  # will be appended here once the initial `npm init` and `mvn spring-boot` scaffolds 
  # are generated by your respective feature teams.

networks:
  hhcc-network:
    driver: bridge

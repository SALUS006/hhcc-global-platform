<div class="login-container">
  <div class="login-card">
    <h2>Login to HHCC</h2>
    <p>Sign in to access your profile and care schedules.</p>
    
    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          class="form-control" 
          formControlName="email"
          placeholder="e.g. admin&#64;hhcc.com or john.doe&#64;email.com"
        >
        <div class="error-text" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
          Please enter a valid email address.
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Logging in...' : 'Sign In' }}
      </button>
    </form>
    
    <div class="mock-hints">
      <h4>Demo Credentials:</h4>
      <ul>
        <li><strong>Admin:</strong> admin&#64;hhcc.com</li>
        <li><strong>Customer:</strong> john.doe&#64;email.com</li>
      </ul>
    </div>
  </div>
</div>
